---
- name: Install xautolock package
  package:
    name: xautolock
    state: present
  become: yes

- name: Find XAUTHORITY path
  shell: find /run/user/$(id -u) -name "Xauthority" 2>/dev/null | head -1
  register: xauthority_find
  changed_when: false
  become: yes
  become_user: "{{ user }}"

- name: Set XAUTHORITY fact
  set_fact:
    xauthority_path: "{{ xauthority_find.stdout | trim or ansible_env.HOME + '/.Xauthority' }}"

- name: Create xautolock systemd service template
  copy:
    dest: /etc/systemd/system/xautolock@.service
    content: |
      [Unit]
      Description=Auto suspend after user inactivity for %i
      After=graphical.target

      [Service]
      Type=simple
      User=%i
      ExecStart=/usr/bin/xautolock -time 180 -locker "systemctl suspend" -detectsleep
      Restart=always
      RestartSec=10
      Environment=DISPLAY=:0
      Environment=XAUTHORITY={{ xauthority_path }}

      [Install]
      WantedBy=graphical.target
    mode: '0644'
  become: yes
  notify: reload systemd

- name: Enable xautolock service for current user
  systemd:
    name: "xautolock@{{ user }}.service"
    enabled: yes
    daemon_reload: yes
  become: yes

- name: Start xautolock service for current user
  systemd:
    name: "xautolock@{{ user }}.service"
    state: started
  become: yes

- name: Remove old systemd logind auto-suspend config
  file:
    path: /etc/systemd/logind.conf.d/auto-suspend.conf
    state: absent
  become: yes
